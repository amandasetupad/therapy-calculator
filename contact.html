<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Therapy Calculator</title>
    <link rel="stylesheet" href="./styles.css?v=20260330-26" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav">
        <a class="logo" href="./index.html">Therapy Calculator</a>
        <nav class="nav-links">
          <a href="./index.html">Home</a>
          <a href="./about.html">About Us</a>
          <a href="./contact.html">Contact Us</a>
          <a href="./privacy-policy.html">Privacy Policy</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <h1>Contact Us</h1>
        <p class="lead">Send your feedback, bug reports, or ideas for new calculator modes.</p>

        <div class="panel contact-panel">
          <label>
            Name
            <input type="text" placeholder="Your name" />
          </label>
          <label>
            Email
            <input type="email" placeholder="you@example.com" />
          </label>
          <label>
            Message
            <textarea rows="5" placeholder="Tell us what to improve..."></textarea>
          </label>
          <a class="btn btn-primary btn-inline" href="mailto:hello@therapycalculator.me">Send via Email App</a>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>This is a playful calculator, not medical advice.</p>
      </div>
    </footer>
  </body>
</html>
